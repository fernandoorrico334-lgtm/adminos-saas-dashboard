<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Painel administrativo SaaS completo com CRM, usuários, financeiro, chamados, auditoria e indicadores."
    />
    <title>AdminOS | Painel Administrativo SaaS</title>
    <link rel="icon" href="assets/admin-mark.svg" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar" aria-label="Navegação principal">
        <a class="brand" href="#dashboard" data-route="dashboard" aria-label="AdminOS">
          <img src="assets/admin-mark.svg" alt="" />
          <span>
            <strong>AdminOS</strong>
            <small>Suite de Operações</small>
          </span>
        </a>

        <nav class="nav-list" id="navList"></nav>

        <section class="workspace-card" aria-label="Área de trabalho">
          <span class="workspace-label">Área de trabalho</span>
          <strong>Norte Cloud</strong>
          <small>Plano Enterprise</small>
          <div class="workspace-meter"><span style="width: 74%"></span></div>
        </section>
      </aside>

      <div class="main-shell">
        <header class="topbar">
          <button class="icon-button mobile-only" id="menuToggle" aria-label="Abrir menu">
            <span></span>
            <span></span>
            <span></span>
          </button>

          <label class="search-box" for="globalSearch">
            <span>Buscar</span>
            <input id="globalSearch" type="search" placeholder="clientes, faturas, chamados..." />
          </label>

          <div class="topbar-actions">
            <button class="ghost-button" id="densityToggle" type="button">Compacto</button>
            <button class="ghost-button" id="themeToggle" type="button">Tema</button>
            <button class="primary-button" id="newClientButton" type="button">Novo cliente</button>
          </div>

          <div class="operator-chip" aria-label="Usuário logado">
            <span>FO</span>
            <strong>Fernando</strong>
            <small>Administrador</small>
          </div>
        </header>

        <main class="content" id="app" tabindex="-1"></main>
      </div>
    </div>

    <div class="overlay" id="overlay" hidden></div>

    <section class="modal" id="clientModal" role="dialog" aria-modal="true" aria-labelledby="clientModalTitle" hidden>
      <form id="clientForm">
        <header class="modal-header">
          <div>
            <p class="eyebrow">CRM</p>
            <h2 id="clientModalTitle">Novo cliente</h2>
          </div>
          <button class="icon-close" type="button" id="closeClientModal" aria-label="Fechar">x</button>
        </header>

        <div class="form-grid">
          <label>
            Empresa
            <input name="company" required placeholder="Ex: Atlas Health" />
          </label>
          <label>
            Responsável
            <input name="owner" required placeholder="Ex: Marina Costa" />
          </label>
          <label>
            Plano
            <select name="plan">
              <option>Essencial</option>
              <option>Crescimento</option>
              <option>Corporativo</option>
            </select>
          </label>
          <label>
            MRR
            <input name="mrr" type="number" min="0" step="50" required placeholder="2500" />
          </label>
          <label>
            Status
            <select name="status">
              <option>Ativo</option>
              <option>Risco</option>
              <option>Trial</option>
              <option>Pausado</option>
            </select>
          </label>
          <label>
            Saúde da conta
            <input name="health" type="number" min="1" max="100" value="82" required />
          </label>
        </div>

        <footer class="modal-footer">
          <button class="ghost-button" type="button" id="cancelClientModal">Cancelar</button>
          <button class="primary-button" type="submit">Salvar cliente</button>
        </footer>
      </form>
    </section>

    <div class="toast" id="toast" role="status" aria-live="polite"></div>

    <script src="app.js" defer></script>
  </body>
</html>
